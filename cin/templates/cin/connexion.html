{% extends 'cin/base.html' %}

{% block title %}Connexion - DIGIT-CIN{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12 bg-white p-8 rounded-2xl shadow-md border border-slate-100">
    
    <div class="text-center mb-6">
        <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-3 text-xl">
            <i class="fa-solid fa-lock-open"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-800">Authentification</h2>
        <p class="text-sm text-slate-500 mt-1">Accès à l'espace : <span class="font-bold text-emerald-600 uppercase">{{ espace }}</span></p>
    </div>

    {% if erreur %}
    <div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded-xl text-xs mb-4 font-medium flex items-center">
        <i class="fa-solid fa-triangle-exclamation mr-2 text-sm"></i> {{ erreur }}
    </div>
    {% endif %}

    <form method="POST" class="space-y-5">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Nom d'utilisateur</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                    <i class="fa-solid fa-user"></i>
                </span>
                <input type="text" name="username" required placeholder="Ex: operateur_saisie" class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                    <i class="fa-solid fa-key"></i>
                </span>
                <input type="password" name="password" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
            </div>
        </div>

        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-xl transition shadow-sm flex items-center justify-center space-x-2">
            <i class="fa-solid fa-right-to-bracket"></i>
            <span>Se connecter</span>
        </button>
    </form>
</div>
{% endblock %}
