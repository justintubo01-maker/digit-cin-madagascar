{% extends 'cin/base.html' %}

{% block title %}Modifier la Demande - {{ demande.numero_cin }}{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto bg-white p-6 rounded-2xl shadow-md border border-slate-100">
    <div class="mb-6">
        <h2 class="text-xl font-bold text-slate-800">Modifier le Dossier CIN</h2>
        <p class="text-xs text-slate-400">Mise à jour des informations pour le numéro : {{ demande.numero_cin }}</p>
    </div>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Numéro CIN</label>
                <input type="text" name="numero_cin" value="{{ demande.numero_cin }}" class="w-full p-2 rounded-xl border text-sm focus:ring-2 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nom</label>
                <input type="text" name="nom" value="{{ demande.nom }}" class="w-full p-2 rounded-xl border text-sm focus:ring-2 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Prénom</label>
                <input type="text" name="prenom" value="{{ demande.prenom }}" class="w-full p-2 rounded-xl border text-sm focus:ring-2 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Téléphone</label>
                <input type="text" name="telephone" value="{{ demande.telephone }}" class="w-full p-2 rounded-xl border text-sm focus:ring-2 focus:ring-emerald-500">
            </div>
        </div>

        <div class="pt-4 border-t flex justify-end space-x-3">
            <a href="{% url 'dashboard_saisie' %}" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-sm font-medium">Annuler</a>
            <button type="submit" class="bg-emerald-600 text-white px-5 py-2 rounded-xl text-sm font-medium shadow-sm">Enregistrer les modifications</button>
        </div>
    </form>
</div>
{% endblock %}
