{% extends 'cin/base.html' %}

{% block title %}Connexion Validateur - DIGIT-CIN{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12 bg-white p-8 rounded-2xl shadow-md border border-slate-100">
    <div class="text-center mb-6">
        <div class="w-16 h-16 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mx-auto mb-3 text-xl">
            <i class="fa-solid fa-user-shield"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-800">Authentification Utilisateur</h2>
        <p class="text-sm text-slate-500 mt-1">Espace : VALIDATION</p>
    </div>

    <form action="{% url 'dashboard_validation' %}" method="GET" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Nom d'utilisateur</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                    <i class="fa-solid fa-user"></i>
                </span>
                <input type="text" placeholder="Ex: validateur_nord" class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" placeholder="••••••••" class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm">
            </div>
        </div>

        <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-medium py-2.5 rounded-xl transition shadow-sm flex items-center justify-center space-x-2">
            <i class="fa-solid fa-shield-halved"></i>
            <span>Accéder à l'espace</span>
        </button>
    </form>

    <div class="mt-6 pt-4 border-t border-slate-100 text-center">
        <a href="{% url 'index_portail' %}" class="inline-flex items-center text-sm text-slate-500 hover:text-slate-800 transition">
            <i class="fa-solid fa-arrow-left mr-2 text-xs"></i> Retour au choix d'accueil
        </a>
    </div>
</div>
{% endblock %}
